<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Developer Portfolio</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Self-contained Icon Components to prevent CDN crashes
        const ExternalLink = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const Play = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const Github = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>;
        const Linkedin = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>;
        const Mail = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
        const X = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

        function CVPortfolio() {
          const [selectedProject, setSelectedProject] = React.useState(null);

          const projects = [
            {
              id: 1,
              title: "ProtoBoat",
              screenshot: "https://via.placeholder.com/500x300/1a1a2e/ff6b6b?text=ProtoBoat+Gameplay",
              description: "An endless runner mobile game that challenges players to dodge obstacles while navigating through dynamic environments. Features responsive touch controls, progressive difficulty scaling, and smooth gameplay mechanics optimized for mobile platforms.",
              technologies: ["Unity", "C#", "Mobile Optimization"],
              demoVideo: "https://www.youtube.com/embed/dQw4w9WgXcQ",
              link: "https://github.com"
            },
            {
              id: 2,
              title: "Fantasy Game Demo",
              screenshot: "https://via.placeholder.com/500x300/1a1a2e/4ecdc4?text=Fantasy+Game+Demo",
              description: "A 2.5D side-scroller adventure combining platforming mechanics, puzzle-solving, and real-time combat. Features advanced enemy AI systems, dynamic level design, and engaging boss encounters. Showcases fluid movement controls and strategic gameplay.",
              technologies: ["Unity", "C#", "AI Systems", "Blender"],
              demoVideo: "https://www.youtube.com/embed/dQw4w9WgXcQ",
              link: "https://github.com"
            },
            {
              id: 3,
              title: "Ecosystem",
              screenshot: "https://via.placeholder.com/500x300/1a1a2e/95e1d3?text=Ecosystem+Simulation",
              description: "A procedurally generated ecosystem simulation where animal AIs thrive in living, breathing environments. Implements advanced pathfinding algorithms and behavior trees to create realistic animal interactions, hunting patterns, and natural ecosystem cycles.",
              technologies: ["Unity", "C#", "A* Pathfinding", "Procedural Generation", "AI Behavior Trees"],
              demoVideo: "https://www.youtube.com/embed/dQw4w9WgXcQ",
              link: "https://github.com"
            }
          ];

          const socials = [
            { icon: Github, label: "GitHub", url: "https://github.com" },
            { icon: Linkedin, label: "LinkedIn", url: "https://linkedin.com" },
            { icon: Mail, label: "Email", url: "mailto:hello@example.com" },
            { icon: X, label: "Twitter", url: "https://twitter.com" }
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800">
              <nav className="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-md border-b border-slate-700/50">
                <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                  <div className="text-2xl font-bold bg-gradient-to-r from-orange-400 to-red-400 bg-clip-text text-transparent">
                    Portfolio
                  </div>
                  <div className="flex gap-8">
                    <a href="#intro" className="text-slate-300 hover:text-white transition">Intro</a>
                    <a href="#projects" className="text-slate-300 hover:text-white transition">Projects</a>
                    <a href="#socials" className="text-slate-300 hover:text-white transition">Connect</a>
                  </div>
                </div>
              </nav>

              <section id="intro" className="min-h-screen flex items-center justify-center px-6 pt-20">
                <div className="max-w-4xl mx-auto text-center">
                  <div className="mb-8 animate-fade-in">
                    <div className="w-32 h-32 mx-auto mb-8 rounded-full bg-gradient-to-br from-orange-400 to-red-400 p-1">
                      <img 
                        src="https://via.placeholder.com/128x128/1a1a2e/ff6b6b?text=Your+Photo" 
                        alt="Profile" 
                        className="w-full h-full rounded-full object-cover bg-slate-900"
                      />
                    </div>
                  </div>
                  
                  <h1 className="text-6xl md:text-7xl font-bold mb-6 leading-tight">
                    <span className="bg-gradient-to-r from-orange-400 via-red-400 to-pink-400 bg-clip-text text-transparent">
                      Game Developer
                    </span>
                  </h1>
                  
                  <p className="text-xl md:text-2xl text-slate-300 mb-8 max-w-2xl mx-auto leading-relaxed">
                    Crafting immersive gaming experiences with 2+ years of game development expertise. Specializing in gameplay mechanics, AI systems, and procedural generation. Passionate about creating engaging interactive worlds that captivate players.
                  </p>

                  <div className="flex gap-4 justify-center flex-wrap">
                    <button className="px-8 py-3 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-semibold transition transform hover:scale-105">
                      View My Work
                    </button>
                    <button className="px-8 py-3 border border-slate-400 text-slate-300 hover:text-white rounded-lg font-semibold transition">
                      Download CV
                    </button>
                  </div>

                  <div className="mt-16 pt-16 border-t border-slate-700">
                    <p className="text-slate-400 mb-6">Tech Stack</p>
                    <div className="flex flex-wrap justify-center gap-4">
                      {["C#", "Unity", "Blender", "Github"].map(tech => (
                        <span key={tech} className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-full text-slate-300 text-sm">
                          {tech}
                        </span>
                      ))}
                    </div>
                  </div>
                </div>
              </section>

              <section id="projects" className="py-24 px-6 bg-gradient-to-b from-transparent to-slate-900/50">
                <div className="max-w-6xl mx-auto">
                  <h2 className="text-5xl font-bold mb-4 text-white">Featured Projects</h2>
                  <p className="text-slate-400 mb-16 text-lg">Click on any project to see details and watch the demo</p>

                  <div className="grid md:grid-cols-2 gap-8">
                    {projects.map((project) => (
                      <div
                        key={project.id}
                        onClick={() => setSelectedProject(project)}
                        className="group cursor-pointer"
                      >
                        <div className="relative bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-0 border border-slate-700 hover:border-orange-400/50 transition-all duration-300 h-full transform hover:scale-105 overflow-hidden">
                          <div className="absolute inset-0 bg-gradient-to-r from-orange-500/0 to-red-500/0 group-hover:from-orange-500/10 group-hover:to-red-500/10 rounded-2xl transition-all duration-300 pointer-events-none"></div>
                          
                          <div className="relative w-full h-48 overflow-hidden bg-black">
                            <img 
                              src={project.screenshot} 
                              alt={project.title}
                              className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300"
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                          </div>

                          <div className="p-8 relative z-10">
                            <div className="flex items-start justify-between mb-4">
                              <h3 className="text-2xl font-bold text-white group-hover:text-orange-300 transition">{project.title}</h3>
                              <Play className="w-6 h-6 text-orange-400 opacity-0 group-hover:opacity-100 transition transform group-hover:scale-110" />
                            </div>
                            
                            <p className="text-slate-400 mb-6 leading-relaxed">{project.description}</p>
                            
                            <div className="flex flex-wrap gap-2">
                              {project.technologies.map(tech => (
                                <span key={tech} className="px-3 py-1 bg-slate-700/50 rounded-full text-slate-300 text-xs border border-slate-600">
                                  {tech}
                                </span>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              <section id="socials" className="py-24 px-6">
                <div className="max-w-6xl mx-auto">
                  <h2 className="text-5xl font-bold mb-16 text-white text-center">Let's Connect</h2>
                  
                  <div className="flex justify-center gap-6 mb-16 flex-wrap">
                    {socials.map(social => {
                      const Icon = social.icon;
                      return (
                        <a
                          key={social.label}
                          href={social.url}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="group"
                        >
                          <div className="w-16 h-16 rounded-full bg-gradient-to-br from-orange-400 to-red-400 p-0.5 hover:from-orange-300 hover:to-red-300 transition-all duration-300 transform hover:scale-110">
                            <div className="w-full h-full rounded-full bg-slate-900 flex items-center justify-center group-hover:bg-slate-800 transition">
                              <Icon className="w-7 h-7 text-orange-400 group-hover:text-orange-300 transition" />
                            </div>
                          </div>
                          <p className="text-center text-slate-300 mt-3 text-sm">{social.label}</p>
                        </a>
                      );
                    })}
                  </div>

                  <div className="bg-gradient-to-r from-orange-400/20 to-red-400/20 border border-orange-400/30 rounded-2xl p-12 text-center">
                    <p className="text-slate-300 text-lg mb-4">Got a project in mind?</p>
                    <p className="text-slate-400">Feel free to reach out. I'm always interested in hearing about new opportunities and challenges.</p>
                  </div>
                </div>
              </section>

              <footer className="border-t border-slate-700 bg-slate-950 py-8 px-6">
                <div className="max-w-6xl mx-auto text-center text-slate-400 text-sm">
                  <p>© 2024 Portfolio. Designed & Built with React.</p>
                </div>
              </footer>

              {selectedProject && (
                <div
                  className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in"
                  onClick={() => setSelectedProject(null)}
                >
                  <div
                    className="bg-slate-900 rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto border border-slate-700"
                    onClick={e => e.stopPropagation()}
                  >
                    <div className="sticky top-0 bg-slate-900 border-b border-slate-700 p-6 flex justify-between items-start">
                      <div>
                        <h3 className="text-3xl font-bold text-white mb-2">{selectedProject.title}</h3>
                        <p className="text-slate-400">Click outside to close</p>
                      </div>
                      <button
                        onClick={() => setSelectedProject(null)}
                        className="text-slate-400 hover:text-white text-3xl transition"
                      >
                        ×
                      </button>
                    </div>

                    <div className="p-8">
                      <div className="mb-8 aspect-video bg-black rounded-xl overflow-hidden">
                        <iframe
                          width="100%"
                          height="100%"
                          src={selectedProject.demoVideo}
                          title={selectedProject.title}
                          frameBorder="0"
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                          allowFullScreen
                        ></iframe>
                      </div>

                      <div className="mb-8">
                        <h4 className="text-xl font-semibold text-white mb-3">About</h4>
                        <p className="text-slate-300 leading-relaxed">{selectedProject.description}</p>
                      </div>

                      <div className="mb-8">
                        <h4 className="text-xl font-semibold text-white mb-4">Technologies Used</h4>
                        <div className="flex flex-wrap gap-3">
                          {selectedProject.technologies.map(tech => (
                            <span key={tech} className="px-4 py-2 bg-orange-500/20 border border-orange-400/50 rounded-lg text-orange-300 text-sm">
                              {tech}
                            </span>
                          ))}
                        </div>
                      </div>

                      <div className="pt-6 border-t border-slate-700">
                        <a
                          href={selectedProject.link}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="inline-flex items-center gap-2 px-6 py-3 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-semibold transition transform hover:scale-105"
                        >
                          View on GitHub <ExternalLink className="w-4 h-4" />
                        </a>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <style>{`
                @keyframes fade-in {
                  from {
                    opacity: 0;
                    transform: translateY(10px);
                  }
                  to {
                    opacity: 1;
                    transform: translateY(0);
                  }
                }

                .animate-fade-in {
                  animation: fade-in 0.3s ease-out;
                }
              `}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CVPortfolio />);
    </script>
</body>
</html>
