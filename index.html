<!DOCTYPE html>
<html lang="en">
<head>

    <title>Sanjay Saji | Game Programmer Portfolio</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <div id="root"></div>

        const Mail = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;

          const projects = [
            {

              title: "ProtoBoat",

              description: "An endless runner mobile game that challenges players to dodge obstacles while navigating through dynamic environments.",
              technologies: ["Unity", "C#", "Mobile Optimization"],
              demoVideo: "https://www.youtube.com/embed/SnNk1iygLjM",
              link: "https://github.com/sanjaysaji234/protobot3d"

            {
              id: 2,
              title: "Fantasy Game Demo",
              screenshot: "./Images/Screenshot 2026-03-29 222347.png",
              description: "A 2.5D side-scroller adventure combining platforming mechanics, puzzle-solving, and real-time combat.",
              technologies: ["Unity", "C#", "AI Systems", "Blender"],
              demoVideo: "https://www.youtube.com/embed/WAqVa_OvOJM",
              link: "https://github.com/sanjaysaji234/Fantasy"

              id: 4,

              link: "https://s-njay.itch.io/frogo-grabo"
            }

          const socials = [
            { icon: Github, label: "GitHub", url: "https://github.com/sanjaysaji234" },
            { icon: Linkedin, label: "LinkedIn", url: "https://www.linkedin.com/in/sanjay-saji-986003301/" },
            { icon: Mail, label: "Email", url: "mailto:sanjaysaji393@gmail.com" },
            { icon: X, label: "Twitter", url: "https://x.com/SanjaySaji50193" }
          ];

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800">

                <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                  <div className="text-2xl font-bold bg-gradient-to-r from-orange-400 to-red-400 bg-clip-text text-transparent">Portfolio</div>
                  <div className="flex gap-8">

                          </div>
                          <div className="p-8 relative z-10">
                            <div className="flex items-start justify-between mb-4">
                              <h3 className="text-2xl font-bold text-white group-hover:text-orange-300 transition">{project.title}</h3>
                              <Play className="w-6 h-6 text-orange-400 opacity-0 group-hover:opacity-100 transition transform group-hover:scale-110" />
                            </div>
                            <p className="text-slate-400 mb-6 leading-relaxed">{project.description}</p>
                            <div className="flex flex-wrap gap-2">

                          </div>
                          <p className="text-slate-300 mt-3 text-sm">{social.label}</p>

                    <div className="p-8">
                      <div className="mb-8 aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-700">
                        {selectedProject.gameUrl ? (
                          <iframe src={selectedProject.gameUrl} className="w-full h-full border-0" allow="fullscreen; autoplay; encrypted-media"></iframe>

                          <iframe width="100%" height="100%" src={selectedProject.demoVideo} frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>

                      <div className="grid md:grid-cols-3 gap-8">

                          <h4 className="text-xl font-semibold text-white mb-3">About the Project</h4>
                          <p className="text-slate-300 leading-relaxed mb-6">{selectedProject.description}</p>
                          <div className="flex flex-wrap gap-2">
                            {selectedProject.technologies.map(tech => (
                              <span key={tech} className="px-4 py-2 bg-orange-500/10 border border-orange-400/30 rounded-lg text-orange-300 text-sm font-medium">{tech}</span>
                            ))}

                        </div>
                        <div className="flex flex-col gap-4">

                          </a>
                        </div>
                      </div>
                    </div>
                  </div>

                <p>© 2026 Portfolio | Sanjay Saji | Built with React & Tailwind</p>
              </footer>

              <style>{`
                @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                .animate-fade-in { animation: fade-in 0.3s ease-out; }
                html { scroll-behavior: smooth; }
              `}</style>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CVPortfolio />);
    </script>
</body>
</html>
